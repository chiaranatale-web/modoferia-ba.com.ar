<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Intercambio de Figuritas · Mundial 2026 · Modo Feria BA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{
      --teal:#1e6b5e;--teal-dark:#155046;--teal-light:#2d8a7a;
      --pink:#f4a8a8;--terra:#c4522a;--olive:#7a9040;
      --cream:#faf5f0;--cream-dk:#f0e8df;
      --txt:#2a2a2a;--txt-m:#555;--txt-l:#999;
      --shadow:0 4px 20px rgba(0,0,0,.08);--r:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    a{text-decoration:none;color:inherit}

    /* HEADER */
    header{background:var(--teal);box-shadow:0 2px 12px rgba(0,0,0,.2);flex-shrink:0;z-index:1000}
    .nav{max-width:100%;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px}
    .nav-logo{display:flex;align-items:center;gap:8px}
    .nav-logo img{height:38px;border-radius:6px;object-fit:contain}
    .nav-logo span{font-family:'Playfair Display',serif;color:#fff;font-size:1.1rem;font-weight:700}
    .nav-back{color:rgba(255,255,255,.85);font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px;transition:color .2s}
    .nav-back:hover{color:var(--pink)}

    /* TOOLBAR */
    .toolbar{background:#fff;border-bottom:2px solid var(--cream-dk);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;z-index:900}
    .toolbar-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--teal-dark);white-space:nowrap;margin-right:8px}
    .toolbar-title span{color:var(--terra)}
    .fbtn{background:var(--cream);border:2px solid var(--cream-dk);color:var(--txt-m);padding:5px 13px;border-radius:20px;font-size:.78rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
    .fbtn:hover{border-color:var(--teal);color:var(--teal)}
    .fbtn.active{background:var(--terra);border-color:var(--terra);color:#fff}
    .count-badge{background:var(--teal);color:#fff;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:800;margin-left:auto}

    /* MAP */
    #map{flex:1;z-index:1}

    /* CUSTOM MARKERS */
    .marker-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;transition:transform .2s}
    .marker-icon:hover{transform:scale(1.2)}

    /* LEAFLET POPUP */
    .leaflet-popup-content-wrapper{border-radius:var(--r);box-shadow:var(--shadow);border:none;font-family:'Nunito',sans-serif}
    .leaflet-popup-content{margin:14px 18px;font-family:'Nunito',sans-serif}
    .popup-cat{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:8px}
    .popup-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--teal-dark);margin-bottom:8px;line-height:1.3}
    .popup-row{display:flex;align-items:flex-start;gap:6px;font-size:.82rem;color:var(--txt-m);margin-bottom:5px}
    .popup-row i{color:var(--teal);width:12px;margin-top:2px;flex-shrink:0}
    .popup-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:.75rem;font-weight:800;padding:3px 10px;border-radius:8px}
    .leaflet-popup-tip{display:none}

    /* LEGEND */
    .legend{position:absolute;bottom:24px;right:12px;background:#fff;border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);z-index:500;font-size:.78rem;min-width:160px}
    .legend-title{font-weight:800;color:var(--teal-dark);margin-bottom:8px;font-size:.82rem}
    .legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;color:var(--txt-m)}
    .legend-dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);flex-shrink:0}

    /* MOBILE */
    @media(max-width:600px){
      .toolbar{padding:8px 12px;gap:6px}
      .toolbar-title{font-size:.95rem}
      .legend{bottom:16px;right:8px;padding:10px 12px}
    }
  </style>
</head>

];

const TYPE_LABEL = {oficial:'Oficial',comunitario:'Comunitario',cultural:'Cultural',comercial:'Comercial'};
const TYPE_BG    = {oficial:'rgba(30,107,94,.12)',comunitario:'rgba(122,144,64,.12)',cultural:'rgba(196,82,42,.12)',comercial:'rgba(232,122,122,.15)'};
const TYPE_COLOR = {oficial:'#1e6b5e',comunitario:'#7a9040',cultural:'#c4522a',comercial:'#e87a7a'};

// ── MAPA ──
const map = L.map('map',{zoomControl:true}).setView([-38.4,-63.6],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:18
}).addTo(map);

function makeIcon(color){
  return L.divIcon({
    className:'',
    html:`<div class="marker-icon" style="background:${color}"><i class="fas fa-map-marker-alt" style="color:#fff;font-size:1rem"></i></div>`,
    iconSize:[32,32],
    iconAnchor:[16,16],
    popupAnchor:[0,-18]
  });
}

let markers = [];
let allLayers = [];

PUNTOS.forEach(p=>{
  const icon = makeIcon(p.color);
  const marker = L.marker([p.lat,p.lng],{icon});
  const catColor = TYPE_COLOR[p.tipo];
  const catBg    = TYPE_BG[p.tipo];
  const catLabel = TYPE_LABEL[p.tipo];
  const gratisBadge = p.gratis
    ? `<span class="popup-badge" style="background:rgba(122,144,64,.12);color:#7a9040">🟢 Entrada gratuita</span>`
    : '';
  const fuenteStr = p.fuente ? `<div class="popup-row"><i class="fas fa-info-circle"></i><span>${p.fuente}</span></div>` : '';
  marker.bindPopup(`
    <span class="popup-cat" style="background:${catBg};color:${catColor}">${catLabel}</span>
    <div class="popup-name">${p.nombre}</div>
    <div class="popup-row"><i class="fas fa-map-marker-alt"></i><span>${p.dir}</span></div>
    <div class="popup-row"><i class="fas fa-calendar-alt"></i><span>${p.dias}</span></div>
    <div class="popup-row"><i class="fas fa-clock"></i><span>${p.hrs}</span></div>
    ${fuenteStr}
    ${gratisBadge}
  `,{maxWidth:280});
  marker.addTo(map);
  markers.push({marker, zona:p.zona, tipo:p.tipo, ciudad:p.ciudad});
  allLayers.push(marker);
});

// ── FILTROS ──
function filterMap(f, btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let visible = 0;
  markers.forEach(({marker,zona,tipo})=>{
    let show = f==='all' || zona===f || tipo===f;
    if(show){marker.addTo(map);visible++;}
    else{marker.remove();}
  });
  document.getElementById('count-badge').textContent=`${visible} punto${visible!==1?'s':''}`;
  if(f!=='all'){
    const vis=markers.filter(({zona,tipo})=>f==='all'||zona===f||tipo===f);
    if(vis.length>0){
      const bounds=L.latLngBounds(vis.map(({marker})=>marker.getLatLng()));
      map.fitBounds(bounds,{padding:[40,40]});
    }
  } else {
    map.setView([-38.4,-63.6],5);
  }
}
</script>
